<svg id="icon-a" width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
          <rect width="120" height="120" rx="26" fill="#0D0D0D"/>
          <rect width="120" height="120" rx="26" fill="url(#scan-a)" opacity="0.04"/>
          <defs>
            <pattern id="scan-a" width="2" height="4" patternUnits="userSpaceOnUse">
              <rect width="2" height="2" fill="white"/>
            </pattern>
          </defs>
          <!-- prompt arrow -->
          <text x="22" y="68" font-family="'JetBrains Mono', monospace" font-size="36" font-weight="700" fill="#FFAA00">&gt;</text>
          <!-- underscore cursor -->
          <rect x="60" y="72" width="24" height="4" rx="1" fill="#FFAA00" class="cursor-blink"/>
          <!-- top bar dots -->
          <circle cx="22" cy="30" r="4" fill="#2a2a2a"/>
          <circle cx="36" cy="30" r="4" fill="#2a2a2a"/>
          <circle cx="50" cy="30" r="4" fill="#2a2a2a"/>
          <!-- status line -->
          <rect x="22" y="87" width="30" height="2" rx="1" fill="#4A7C59" opacity="0.8"/>
          <rect x="56" y="87" width="18" height="2" rx="1" fill="#555" opacity="0.6"/>
          <rect x="78" y="87" width="20" height="2" rx="1" fill="#5a8faa" opacity="0.5"/>
        </svg>